<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lernplattform</title>
<style>
:root{
  --bg:#0f1115;
  --panel:#171a21;
  --panel2:#1f2430;
  --text:#e8ecf1;
  --muted:#a9b2c0;
  --border:#2b3242;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,Segoe UI,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  height:100vh;
}
nav{
  width:250px;
  background:var(--panel);
  border-right:1px solid var(--border);
  padding:18px;
}
nav h3{
  margin-top:0;
}
nav button, .action{
  width:100%;
  border:none;
  border-radius:10px;
  padding:12px;
  margin:5px 0;
  background:var(--panel2);
  color:var(--text);
  cursor:pointer;
}
nav button:hover,.action:hover{
  filter:brightness(1.1);
}
main{
  flex:1;
  padding:24px;
  overflow:auto;
}
.section{display:none}
.section.active{display:block}
input,textarea{
  width:100%;
  background:var(--panel);
  border:1px solid var(--border);
  color:var(--text);
  border-radius:10px;
  padding:12px;
  margin:8px 0;
}
textarea{min-height:120px}
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  margin-top:10px;
  box-shadow:0 4px 12px rgba(0,0,0,.2);
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
}
.stat{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px;
}
h2{margin-top:0}
.small{color:var(--muted);font-size:.9rem}
</style>
</head>
<body>
<nav>
<h3>📚 Lernplattform</h3>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('subjects')">Fächer</button>
<button onclick="show('flashcards')">Lernkarten</button>
<button onclick="show('quiz')">Quiz</button>
<hr style="border-color:#2b3242">
<button onclick="exportData()">Export</button>
<input type="file" id="importFile">
<button onclick="importData()">Import</button>
</nav>

<main>
<div id="dashboard" class="section active">
<h2>Dashboard</h2>
<div id="stats" class="grid"></div>
</div>

<div id="subjects" class="section">
<h2>Fächer</h2>
<input id="subjectName" placeholder="Fachname">
<button class="action" onclick="addSubject()">Fach hinzufügen</button>
<div id="subjectList"></div>
</div>

<div id="flashcards" class="section">
<h2>Lernkarten</h2>
<input id="front" placeholder="Vorderseite">
<textarea id="back" placeholder="Rückseite"></textarea>
<button class="action" onclick="addCard()">Lernkarte speichern</button>
<div id="cardList"></div>
</div>

<div id="quiz" class="section">
<h2>Quiz</h2>
<p class="small">Quiz-JSON von ChatGPT hier einfügen.</p>
<textarea id="quizImport"></textarea>
<button class="action" onclick="importQuiz()">Quiz importieren</button>
<div id="quizList"></div>
</div>
</main>

<script>
let db=JSON.parse(localStorage.getItem('lernarchiv')||'{"subjects":[],"flashcards":[],"quizzes":[]}');

function save(){localStorage.setItem('lernarchiv',JSON.stringify(db));render();}
function show(id){
 document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}
function addSubject(){
 let n=subjectName.value.trim();
 if(!n)return;
 db.subjects.push({name:n});
 subjectName.value='';
 save();
}
function addCard(){
 let f=front.value.trim(), b=back.value.trim();
 if(!f||!b)return;
 db.flashcards.push({front:f,back:b});
 front.value=''; back.value='';
 save();
}
function importQuiz(){
 try{
   let q=JSON.parse(document.getElementById('quizImport').value);
   db.quizzes.push(q);
   save();
   alert('Importiert');
 }catch(e){alert('Ungültiges JSON');}
}
function exportData(){
 const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='lernarchiv.json';
 a.click();
}
function importData(){
 const f=document.getElementById('importFile').files[0];
 if(!f)return;
 const r=new FileReader();
 r.onload=()=>{db=JSON.parse(r.result);save();};
 r.readAsText(f);
}
function render(){
 stats.innerHTML=`
 <div class="stat"><h3>${db.subjects.length}</h3><div>Fächer</div></div>
 <div class="stat"><h3>${db.flashcards.length}</h3><div>Lernkarten</div></div>
 <div class="stat"><h3>${db.quizzes.length}</h3><div>Quizze</div></div>`;

 subjectList.innerHTML=db.subjects.map(s=>`<div class="card">${s.name}</div>`).join('');
 cardList.innerHTML=db.flashcards.map(c=>`<div class="card"><strong>${c.front}</strong><hr>${c.back}</div>`).join('');
 quizList.innerHTML=db.quizzes.map((q,i)=>`<div class="card">Quiz ${i+1}: ${q.title||'Ohne Titel'}</div>`).join('');
}
render();
</script>
</body>
</html>
